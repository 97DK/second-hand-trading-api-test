[pytest]
# pytest配置文件

# 测试文件命名规则
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 默认参数
addopts = 
    -v
    -s
    --tb=short
    --strict-markers
    --disable-warnings

# 测试路径
testpaths = testcase

# 标记定义
markers =
    smoke: 冒烟测试，核心功能验证
    regression: 回归测试，确保功能稳定
    p0: P0级别 - 核心功能，必须通过
    p1: P1级别 - 重要功能
    p2: P2级别 - 一般功能
    integration: 集成测试
    performance: 性能测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s (%(filename)s:%(lineno)d)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 超时设置
timeout = 30

# 并行执行
# addopts += -n auto
