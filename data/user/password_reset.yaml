# data/user/password_reset.yaml
api_name: 密码重置申请
path: /api/users/password-reset-request/
method: POST
content_type: multipart/form-data
auth_required: false

test_cases:
  - id: TC-AUTH-026
    name: 提交成功
    description: 学生成功提交密码重置申请
    tags: [regression, p1, 用户认证, 正常场景]
    data:
      student_id: 20221080117
      student_name: 张三
      new_password: TFBOYS2023
    files:
      student_card_photo: "@studentcard.jpg"
    expected:
      status_code: 200
      message: "密码重置申请已提交"

  - id: TC-AUTH-027
    name: 学号为空
    description: 学号字段值为空
    tags: [regression, p2, 用户认证, 参数异常]
    data:
      student_id: ""
      student_name: 张三
      new_password: TFBOYS2023
    files:
      student_card_photo: "@studentcard.jpg"
    expected:
      status_code: 400
      message_contains: ["student_id"]

  - id: TC-AUTH-028
    name: 姓名为空
    description: 姓名字段值为空
    tags: [regression, p2, 用户认证, 参数异常]
    data:
      student_id: 20221080117
      student_name: ""
      new_password: TFBOYS2023
    files:
      student_card_photo: "@studentcard.jpg"
    expected:
      status_code: 400
      message_contains: ["student_name"]

  - id: TC-AUTH-029
    name: 缺少照片
    description: 未上传学生证照片
    tags: [regression, p2, 用户认证, 参数异常]
    content_type: application/json
    data:
      student_id: 20221080117
      student_name: 张三
      new_password: TFBOYS2023
    files: {}
    expected:
      status_code: 500
      message_contains: ["Multipart form parse error"]

  - id: TC-AUTH-030
    name: 密码为空
    description: 新密码字段值为空
    tags: [regression, p2, 用户认证, 参数异常]
    data:
      student_id: 20221080117
      student_name: 张三
      new_password: ""
    files:
      student_card_photo: "@studentcard.jpg"
    expected:
      status_code: 400
      message_contains: ["new_password"]