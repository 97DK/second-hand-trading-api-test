# data/admin/wish_manage.yaml
api_name: 心愿管理
path: /api/products/admin/wishes/
method: POST
content_type: application/json
auth_required: true
auth_type: admin

test_cases:
  - id: TC-WISH-MANAGE-001
    name: 通过心愿
    description: 管理员通过心愿审核
    tags: [smoke, p0, 管理员, 正常场景]
    setup:  # 前置步骤
      - "获取待审核心愿列表"  # 先执行获取待审核心愿列表
    data:
      wish_id: "${first_pending_wish_id}"  # 使用提取的变量
      action: approve
    expected:
      status_code: 200
      message: "心愿已通过"

  - id: TC-WISH-MANAGE-002
    name: 拒绝心愿
    description: 管理员拒绝心愿审核
    tags: [smoke, p0, 管理员, 正常场景]
    setup:  # 前置步骤
      - "获取待审核心愿列表"  # 先执行获取待审核心愿列表
    data:
      wish_id: "${first_pending_wish_id}"  # 使用提取的变量
      action: reject
      reason: "价格过高"
    expected:
      status_code: 200
      message: "心愿已被拒绝"

  - id: TC-WISH-MANAGE-003
    name: wish_id为空
    description: 请求参数缺少心愿ID
    tags: [regression, p2, 管理员, 参数异常]
    data:
      action: approve
    expected:
      status_code: 404


  - id: TC-WISH-MANAGE-004
    name: action为空
    description: 请求参数缺少操作类型
    tags: [regression, p2, 管理员, 参数异常]
    data:
      wish_id: 1
    expected:
      status_code: 500


  - id: TC-WISH-MANAGE-005
    name: 拒绝时无原因
    description: 拒绝心愿但未提供原因
    tags: [regression, p2, 管理员, 参数异常]
    data:
      wish_id: 1
      action: reject
    expected:
      status_code: 400
      message_contains: ["reason", "原因"]

  - id: TC-WISH-MANAGE-006
    name: 操作不存在的心愿
    description: 尝试操作不存在的心愿
    tags: [regression, p2, 管理员, 业务异常]
    data:
      wish_id: 99999  # 固定使用不存在的心愿ID
      action: approve
    expected:
      status_code: 404
      message_contains: ["心愿不存在"]