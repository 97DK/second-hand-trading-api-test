# data/product/create.yaml
api_name: 创建商品
path: /api/products/
method: POST
content_type: multipart/form-data
auth_required: true
auth_type: student

test_cases:
  - id: TC-PROD-001
    name: 发布成功
    description: 学生用户成功发布商品
    tags: [smoke, p0, 商品管理, 正常场景]
    data:
      title: "2"
      description: "3"
      category: book
      condition: seven
      price: 4
      inventory: 1
      dormitory_building: "5"
    files:
      images: "@product.jpg"
    expected:
      status_code: 201
      check_points:
        - "resp_json.get('id') is not None"
        - "resp_json['status'] == 'pending'"
        - "'title' in resp_json"

  - id: TC-PROD-002
    name: 标题为空
    description: 商品标题字段值为空
    tags: [regression, p2, 商品管理, 参数异常]
    data:
      title: ""
      description: "3"
      category: book
      condition: seven
      price: 4
      inventory: 1
      dormitory_building: "5"
    files:
      images: "@product.jpg"
    expected:
      status_code: 400
      message_contains: ["该字段不能为空"]

  - id: TC-PROD-003
    name: 描述为空
    description: 商品描述字段值为空
    tags: [regression, p2, 商品管理, 参数异常]
    data:
      title: "2"
      description: ""
      category: book
      condition: seven
      price: 4
      inventory: 1
      dormitory_building: "5"
    files:
      images: "@product.jpg"
    expected:
      status_code: 400
      message_contains: ["该字段不能为空"]

  - id: TC-PROD-004
    name: 分类为空
    description: 商品分类字段值为空
    tags: [regression, p2, 商品管理, 参数异常]
    data:
      title: "2"
      description: "3"
      category: ""
      condition: seven
      price: 4
      inventory: 1
      dormitory_building: "5"
    files:
      images: "@product.jpg"
    expected:
      status_code: 400
      message_contains: ["不是合法选项"]

  - id: TC-PROD-005
    name: 新旧程度为空
    description: 新旧程度字段值为空
    tags: [regression, p2, 商品管理, 参数异常]
    data:
      title: "2"
      description: "3"
      category: book
      condition: ""
      price: 4
      inventory: 1
      dormitory_building: "5"
    files:
      images: "@product.jpg"
    expected:
      status_code: 400
      message_contains: ["请选择有效的商品成色"]

  - id: TC-PROD-006
    name: 价格为空
