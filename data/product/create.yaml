      message_contains: ["请填写合法的数字"]

  - id: TC-PROD-007
    name: 库存为空
    description: 库存字段值为空
    tags: [regression, p2, 商品管理, 参数异常]
    data:
      title: "2"
      description: "3"
      category: book
